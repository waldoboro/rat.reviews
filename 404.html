<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="shortcut icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8">
  <link rel="stylesheet" href="rat.css">
  <title>404 Rat Reviews</title>
 <!-- Title Changer -->
  <script>
    // 1. Define the characters you want to cycle through
    const symbols = [
  "★", "☆", "✦", "✧", "✩", "✪", "✫", "✬", // Stars & Sparkles
  "☀", "☁", "☾", "☄", "⚡", "❄", "❅", "❆", // Nature & Weather
  "⌬", "⏍", "⏏", "⧉", "⧇", "⧅", "⧄", "⍈", // Geometric & Tech
  "⚓", "⚔", "⚙", "⚗", "⚖", "⚰"              // Miscellaneous Objects
];
    let index = 0;

    // 2. Set a timer to update the title
    setInterval(() => {
      // Update the title with the current symbol
      document.title = `4${symbols[index]}4`;
      
      // Move to the next index, or loop back to 0
      index = (index + 1) % symbols.length;
    }, 100); // 200ms = 5 times per second
  </script>
  <link href='https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&family=DM+Mono:wght@500&display=swap' rel='stylesheet'>
  <style>
    :root {
      --black: #0a0a0a;
      --white: #f5f0e8;
      --yellow: #FFE500;
      --teal: #0A7373;
      --orange: #C43302;
      --sage: #b7bf99;
      --shadow-lg: 8px 8px 0px var(--black);
      --grid-x: 0px;
      --grid-y: 0px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--white);
      color: var(--black);
      min-height: 100vh;
      overflow-x: hidden;
      cursor: crosshair;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    /* ── GRID OVERLAY — shifts with parallax via CSS vars ── */
    body::before {
      content: '';
      position: fixed;
      inset: -60px;
      background-image:
        linear-gradient(var(--teal) 1px, transparent 1px),
        linear-gradient(90deg, var(--black) 1px, transparent 1px);
      background-size: 60px 60px;
      background-position: var(--grid-x) var(--grid-y);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
      transition: background-position 0.12s ease-out;
    }

    /* ── SCANLINES — drift downward ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.045) 3px,
        rgba(0,0,0,0.045) 4px
      );
      pointer-events: none;
      z-index: 100;
      animation: scanroll 8s linear infinite;
    }

    @keyframes scanroll {
      from { background-position: 0 0; }
      to   { background-position: 0 200px; }
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 1;
      width: 100%;
      padding: clamp(24px, 5vw, 60px) clamp(20px, 5vw, 40px) 0;
      display: flex;
      justify-content: center;
    }

    .logo-block {
      background: var(--yellow);
      border: 4px solid var(--black);
      box-shadow: var(--shadow-lg);
      padding: 12px 24px;
      transform: rotate(-1deg);
      transition: transform 0.2s, box-shadow 0.2s;
      text-align: center;
      cursor: pointer;
      user-select: none;
    }
    .logo-block:hover {
      transform: rotate(0deg) scale(1.02);
      box-shadow: 12px 12px 0 var(--black);
    }
    .logo-block h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 20vw, 12rem);
      line-height: 1;
      letter-spacing: 6px;
      color: var(--black);
    }
    .rat-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: var(--black);
      color: var(--yellow);
      padding: 4px 10px;
      display: inline-block;
      margin-bottom: 6px;
    }

    /* ── WANDERING GIF ── */
    .imgu {
      position: fixed;
      width: clamp(100px, 18vw, 200px);
      height: auto;
      z-index: 2;
      pointer-events: none;
      left: 50%;
      top: 60%;
      transform: translate(-50%, -50%);
    }

    /* ── DECORATIVE COLUMN ── */
    .deco-col {
      position: fixed;
      top: 0;
      right: 0;
      width: 12px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      z-index: 5;
    }
    .deco-col div { flex: 1; border-left: 4px solid var(--black); }
    .deco-col div:nth-child(1) { background: var(--teal); }
    .deco-col div:nth-child(2) { background: var(--yellow); }
    .deco-col div:nth-child(3) { background: var(--orange); }
    .deco-col div:nth-child(4) { background: var(--sage); }
  </style>
</head>
<body>

  <div class="deco-col">
    <div></div><div></div><div></div><div></div>
  </div>

  <header>
    <div class="logo-block" id="logoBlock">
      <div class="rat-tag">★ Wrong Turn, Buddy ★</div>
      <h1 id="glitchNum">404</h1>
    </div>
  </header>

  <img src="walkin.gif" alt="Porro" class="imgu" id="wanderer">

<script>
  // ── 1. GLITCH on click ─────────────────────────────────────────────────────
  const glitchNum = document.getElementById('glitchNum');
  const logoBlock = document.getElementById('logoBlock');
  let glitching = false;

  logoBlock.addEventListener('click', () => {
    if (glitching) return;
    glitching = true;

    const duration = 1000;
    const interval = 55;
    let elapsed = 0;

    const scramble = setInterval(() => {
      const r = () => Math.floor(Math.random() * 10);
      glitchNum.textContent = `${r()}${r()}${r()}`;
      elapsed += interval;
      if (elapsed >= duration) {
        clearInterval(scramble);
        glitchNum.textContent = '404';
        setTimeout(() => { glitchNum.textContent = '???'; }, 80);
        setTimeout(() => { glitchNum.textContent = '404'; glitching = false; }, 180);
      }
    }, interval);
  });

  // ── 2. PARALLAX grid ──────────────────────────────────────────────────────
  const rootEl = document.documentElement;

  function setParallax(nx, ny) {
    // nx, ny normalised -0.5 to 0.5 — grid moves opposite to input
    const strength = 24;
    rootEl.style.setProperty('--grid-x', `${-nx * strength}px`);
    rootEl.style.setProperty('--grid-y', `${-ny * strength}px`);
  }

  // ── 3. WANDERING GIF — lerped toward target position ─────────────────────
  const wanderer = document.getElementById('wanderer');
  let wx = window.innerWidth  * 0.5;
  let wy = window.innerHeight * 0.6;
  let tx = wx, ty = wy;
  const LERP = 0.055;

  function lerp(a, b, t) { return a + (b - a) * t; }

  (function animateWanderer() {
    wx = lerp(wx, tx, LERP);
    wy = lerp(wy, ty, LERP);
    wanderer.style.left      = wx + 'px';
    wanderer.style.top       = wy + 'px';
    wanderer.style.transform = 'translate(-50%, -50%)';
    requestAnimationFrame(animateWanderer);
  })();

  const isMobile = () => window.matchMedia('(pointer: coarse)').matches;

  // ── 4a. DESKTOP: follow mouse ─────────────────────────────────────────────
  document.addEventListener('mousemove', (e) => {
    if (isMobile()) return;
    tx = e.clientX;
    ty = e.clientY;
    const nx = (e.clientX / window.innerWidth)  - 0.5;
    const ny = (e.clientY / window.innerHeight) - 0.5;
    setParallax(nx, ny);
  });

  // ── 4b. MOBILE: tilt to slide ─────────────────────────────────────────────
  function initTilt() {
    window.addEventListener('deviceorientation', (e) => {
      if (!isMobile()) return;

      // gamma = left/right (-90→90), beta = forward/back (-180→180)
      const gam = Math.max(-35, Math.min(35, e.gamma || 0));
      const bet = Math.max(-35, Math.min(35, (e.beta  || 0) - 30)); // offset for natural hold

      const nx = gam / 35; // -1 to 1
      const ny = bet / 35;

      const pad = 80;
      tx = ((nx + 1) / 2) * (window.innerWidth  - pad * 2) + pad;
      ty = ((ny + 1) / 2) * (window.innerHeight - pad * 2) + pad;

      setParallax(nx * 0.5, ny * 0.5);
    });
  }

  // iOS 13+ requires a permission request triggered by user gesture
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    document.addEventListener('click', () => {
      DeviceOrientationEvent.requestPermission()
        .then(state => { if (state === 'granted') initTilt(); })
        .catch(() => {});
    }, { once: true });
  } else {
    initTilt();
  }
</script>

</body>
</html>
