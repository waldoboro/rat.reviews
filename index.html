<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="shortcut icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Rat Reviews</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0a0a0a;
      --white: #f5f0e8;
      --yellow: #FFE500;
      --teal: #0f2cc1;
      --orange: #cf0a0a;
      --sage: #0ead25;
      --shadow: 5px 5px 0px var(--black);
      --shadow-lg: 8px 8px 0px var(--black);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      overscroll-behavior: none; /* prevents rubber-band drag on mobile */
    }

    body {
      background-color: var(--white);
      color: var(--black);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      cursor: crosshair;
    }

    /* GRID OVERLAY */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--teal) 1px, transparent 1px),
        linear-gradient(90deg, var(--black) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 1;
      padding: 40px 40px 0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .logo-block {
      background: var(--yellow);
      border: 4px solid var(--black);
      box-shadow: var(--shadow-lg);
      padding: 12px 24px;
      transform: rotate(-1deg);
      transition: transform 0.2s, box-shadow 0.2s;
      /* Prevent text selection on click */
      user-select: none;
      -webkit-user-select: none;
      cursor: pointer;
    }
    .logo-block:hover {
      transform: rotate(0deg) scale(1.02);
      box-shadow: 12px 12px 0 var(--black);
    }

    .logo-block h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 10vw, 8rem);
      line-height: 1;
      letter-spacing: 4px;
      color: var(--black);
      text-transform: uppercase;
      /* belt-and-suspenders against selection */
      pointer-events: none;
    }

    .rat-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: var(--black);
      color: var(--yellow);
      padding: 4px 10px;
      display: inline-block;
      margin-bottom: 6px;
      pointer-events: none;
    }

    /* ── MAIN ── */
    main {
      position: relative;
      z-index: 1;
      padding: 60px 40px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      max-width: 900px;
      margin: 0 auto;
    }

    /* ── NAV BUTTONS ── */
    .nav-btn {
      display: flex;
      align-items: center;
      text-decoration: none;
      border: 4px solid var(--black);
      border-top: none;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 6vw, 4.5rem);
      letter-spacing: 6px;
      color: var(--black);
      padding: 20px 32px;
      background: var(--white);
      transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }

    .nav-btn:first-child { border-top: 4px solid var(--black); }

    .nav-btn .arrow {
      margin-left: auto;
      font-size: 2rem;
      transition: transform 0.2s;
      opacity: 0;
    }
    .nav-btn:hover .arrow { opacity: 1; transform: translateX(6px); }

    .nav-btn .num {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 2px;
      margin-right: 20px;
      opacity: 0.45;
      align-self: flex-end;
      margin-bottom: 8px;
    }

    .btn-albums  { border-left: 14px solid var(--teal); }
    .btn-albums:hover  { background: var(--teal);   color: var(--white); }
    .btn-tracks  { border-left: 14px solid var(--sage); }
    .btn-tracks:hover  { background: var(--sage);   color: var(--black); }
    .btn-archive { border-left: 14px solid var(--yellow); }
    .btn-archive:hover { background: var(--yellow); color: var(--black); }
    .btn-about   { border-left: 14px solid var(--orange); }
    .btn-about:hover   { background: var(--orange); color: var(--white); }

    /* ── FOOTER STRIP ── */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      border-top: 4px solid var(--black);
      background: var(--black);
      color: var(--yellow);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 8px 0;
      overflow: hidden;
      white-space: nowrap;
    }

    /* Two identical spans side by side — seamless loop */
    .ticker-track {
      display: inline-block;
      animation: ticker 200s linear infinite;
    }

    /* Second span starts exactly where the first ends */
    .ticker-track:nth-child(2) {
      animation-delay: -45s; /* half the duration = perfectly offset */
    }

    @keyframes ticker {
      from { transform: translateX(0); }
      to   { transform: translateX(-100%); }
    }

    /* ── DECORATIVE BLOCKS ── */
    .deco-col {
      position: fixed;
      top: 0;
      right: 0;
      width: 12px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      z-index: 5;
    }
    .deco-col div { flex: 1; border-left: 4px solid var(--black); }
    .deco-col div:nth-child(1) { background: var(--teal); }
    .deco-col div:nth-child(2) { background: var(--yellow); }
    .deco-col div:nth-child(3) { background: var(--orange); }
    .deco-col div:nth-child(4) { background: var(--sage); }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      header { padding: 24px 20px 0; }
      main   { padding: 40px 20px; }
      .nav-btn { padding: 16px 20px; letter-spacing: 3px; }
      footer { padding: 6px 0; }
    }
  </style>
</head>
<body>

  <div class="deco-col">
    <div></div><div></div><div></div><div></div>
  </div>

  <header>
    <div class="logo-block" id="logoBlock">
      <div class="rat-tag">★ UNQUALIFIED ★</div>
      <h1 id="glitchNum">Rat Reviews</h1>
    </div>
  </header>

  <main>
    <a href="Recent" class="nav-btn btn-albums">
      <span class="num">01</span>
      Reviews
      <span class="arrow">→</span>
    </a>
    <a href="Archive" class="nav-btn btn-tracks">
      <span class="num">02</span>
      Archive
      <span class="arrow">→</span>
    </a>
    <a href="About" class="nav-btn btn-archive">
      <span class="num">03</span>
      About
      <span class="arrow">→</span>
    </a>
    <a href="Contact" class="nav-btn btn-about">
      <span class="num">04</span>
      Contact
      <span class="arrow">→</span>
    </a>
  </main>

  <!-- Two identical tracks for seamless loop — JS fills both -->
  <footer>
    <span class="ticker-track" id="ticker1"></span>
    <span class="ticker-track" id="ticker2"></span>
  </footer>

<script>
  // ── GLITCH on click/tap ────────────────────────────────────────────────
  const glitchNum = document.getElementById('glitchNum');
  const logoBlock = document.getElementById('logoBlock');
  let glitching = false;

  // Use pointerdown so it fires on both mouse and touch
  logoBlock.addEventListener('pointerdown', (e) => {
    e.preventDefault(); // stops text selection on mobile tap
    if (glitching) return;
    glitching = true;

    const duration = 1000;
    const interval = 55;
    let elapsed = 0;

    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%';
    const r = () => chars[Math.floor(Math.random() * chars.length)];

    const scramble = setInterval(() => {
      glitchNum.textContent = Array.from({length: 10}, r).join('');
      elapsed += interval;
      if (elapsed >= duration) {
        clearInterval(scramble);
        glitchNum.textContent = 'Rat Reviews';
        setTimeout(() => { glitchNum.textContent = 'TAR SWEIVER'; }, 80);
        setTimeout(() => { glitchNum.textContent = 'Rat Reviews'; glitching = false; }, 180);
      }
    }, interval);

    // Always restore tilt after interaction
    logoBlock.style.transform = 'rotate(-1deg)';
  });

  // ── SEAMLESS TICKER ────────────────────────────────────────────────────
  const phrases = [
    "RAT REVIEWS","AUDIT","PROTOCOL","ANALYTICS","OPERATIONAL THEATRE","RAT REVIEWS",
    "EXHAUSTION","DISMISSAL","ABSENCE","SECURITY APPARATUS","RAT REVIEWS",
    "DISLOCATION","ATTRITION","VIRALITY","EROSION","🌭",
    "CONTRACTS","PROVISIONARY","LIQUIDATION","ASSESSMENTS","AUTHORIZATION",
    "RAT REVIEWS","SUBSCRIPTION","AUTOMATION","PIPELINE","SCALABILITY",
    "RAT REVIEWS","COMPLIANCE","TERMINATION","MANDATES","DIVESTMENT",
    "RAT REVIEWS","FORCE MULTIPLIER","ADAPTIVE SUPPRESSION","BLACK SITE","APATHY",
    "RAT REVIEWS","KINETIC","ENTROPY","OVERSIGHT","ESCALATION PROTOCOL",
    "RAT REVIEWS","LAUGHTER","VACANCY","PLACEBO","ISOLATE",
    "RAT REVIEWS","LEVERAGE","FIDELITY","ECONOMIC HARM","SPOLIATION",
    "RAT REVIEWS","COMPOUND","RESIDUE","CONTAINMENT","METRIC",
    "RAT REVIEWS","TITRATION","PERMANENCE","DETACHMENT","SEVERANCE",
    "REDUNDANCY","EXPANSION","SPADES","OUTREACH","ARBITRATION",
    "RAT REVIEWS","CREATINE","DECAY","GOOD FAITH","CAFFEINE",
    "RAT REVIEWS","EXTRACTION","MARGINS","CAPITAL","DEPRECIATION",
    "RAT REVIEWS","OBSOLESCENCE","REDUCTION","INERTIA","COLLAPSE",
    "ENGAGEMENT","VALUATION","INDEX","EQUITY","COLLATERAL",
    "RAT REVIEWS","MONETIZATION","SPECULATIVE","INSOLVENCY","LIABILITY",
    "RAT REVIEWS","DOSAGE","INTERVENTION","© COPYRIGHT 2026",
    "REGRESSIVE","SATURATION","RAT REVIEWS","ALBUMS","TRACKS","ARCHIVE","🍒",
    "SOUNDS GOOD","CRITICAL EARS","RECOMMENDED LISTENING","NO SKIPS",
  ];

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Same shuffled content in both spans — they leapfrog each other
  const text = shuffle(phrases).join('  ·  ') + '  ·  ';
  document.getElementById('ticker1').textContent = text;
  document.getElementById('ticker2').textContent = text;
</script>

</body>
</html>
